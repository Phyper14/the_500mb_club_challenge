name: Benchmark issue gate

# ---------------------------------------------------------------------------
# Valida pedidos de benchmark abertos via issue e aplica o label
# `benchmark-request` somente quando:
#   1. Título casa `test/<id>` OU `test/<owner>/<id>` (id no formato do schema
#      da submissão).
#   2. Existe `submissions/<owner>.json` no branch principal, onde:
#        - `test/<id>`         => owner = autor da issue (self-service);
#        - `test/<owner>/<id>` => owner do título, MAS só se o autor da issue
#          estiver em TRUSTED_AUTHORS (mantenedores + github-actions[bot]).
#   3. O `<id>` extraído do título existe em `submissions[].id` daquele arquivo.
#
# A forma `test/<owner>/<id>` permite que um mantenedor (ou o disparo
# automático no merge, via github-actions[bot]) abra a issue mirando a
# submissão do dono real, sem a trava "autor == dono". Ver
# `submission-merged-benchmark.yml` para o disparo automático.
#
# Em falha: comenta a razão, aplica `benchmark-rejected` e fecha a issue.
# O daemon Pi-Bench (bench-runner) só pega issues com o label
# `benchmark-request` — ou seja, este workflow é a única origem confiável
# desse label (barreira 2 do modelo de ameaça).
#
# Segurança:
#   - Roda a partir do default branch (não há injeção do "PR" aqui).
#   - Inputs do usuário (título, login) entram via env, não via ${{ }} em shell.
#   - Login/owner são re-validados por regex (^[A-Za-z0-9][A-Za-z0-9-]{0,38}$).
#   - Owner explícito só é honrado para autor confiável (TRUSTED_AUTHORS).
#   - Token só com `issues: write` + `contents: read`.
# ---------------------------------------------------------------------------

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-benchmark-gate-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate benchmark request
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.issue.state == 'open'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
      # Regex do id (como no resolve_submission.py) e do owner (login GitHub).
      ID_RE: '^[a-z0-9](([a-z0-9._-]{0,48}[a-z0-9])?)$'
      OWNER_RE: '^[A-Za-z0-9][A-Za-z0-9-]{0,38}$'
      # Autores confiaveis que podem usar a forma `test/<owner>/<id>` mirando
      # a submissao de outro usuario (espaco-separado, case-insensitive).
      TRUSTED_AUTHORS: 'github-actions[bot] gandarez the500mbclub'
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Ensure labels exist
        run: |
          set -uo pipefail
          gh label create benchmark-request \
            --color "0E8A16" \
            --description "Validated benchmark request, awaiting daemon" \
            --force >/dev/null 2>&1 || true
          gh label create benchmark-running \
            --color "FBCA04" \
            --description "Benchmark running on the Pi-Bench daemon" \
            --force >/dev/null 2>&1 || true
          gh label create benchmark-done \
            --color "5319E7" \
            --description "Benchmark completed successfully" \
            --force >/dev/null 2>&1 || true
          gh label create benchmark-failed \
            --color "D93F0B" \
            --description "Benchmark failed during execution" \
            --force >/dev/null 2>&1 || true
          gh label create benchmark-rejected \
            --color "B60205" \
            --description "Benchmark request rejected automatically" \
            --force >/dev/null 2>&1 || true

      - name: Skip if not a benchmark request
        id: scope
        run: |
          set -uo pipefail
          # Só processa issues cujo título tem alguma chance de ser pedido
          # de benchmark. Sem isso, qualquer issue normal cairia no fluxo
          # de "rejeitado" e seria fechada — ruim.
          #
          # Duas formas aceitas:
          #   test/<id>          -> owner = autor da issue
          #   test/<owner>/<id>  -> owner explicito (honrado na validação só
          #                         se o autor for confiável)
          if [[ "$ISSUE_TITLE" != test/* ]]; then
            echo "in_scope=0" >> "$GITHUB_OUTPUT"
            echo "Issue fora de escopo (título: '$ISSUE_TITLE'); nada a fazer."
            exit 0
          fi
          rest="${ISSUE_TITLE#test/}"
          # `<id>` nunca contém '/', então o primeiro '/' separa owner do id.
          if [[ "$rest" == */* ]]; then
            owner="${rest%%/*}"
            sub_id="${rest#*/}"
            explicit_owner=1
          else
            owner="$ISSUE_AUTHOR"
            sub_id="$rest"
            explicit_owner=0
          fi
          # Valida formatos (id sempre; owner só na forma explícita, pois na
          # implícita o login do GitHub já é confiável).
          if ! [[ "$sub_id" =~ $ID_RE ]]; then
            echo "in_scope=0" >> "$GITHUB_OUTPUT"
            echo "Título sem id válido ('$ISSUE_TITLE'); nada a fazer."
            exit 0
          fi
          if [[ "$explicit_owner" == "1" ]] && ! [[ "$owner" =~ $OWNER_RE ]]; then
            echo "in_scope=0" >> "$GITHUB_OUTPUT"
            echo "Título com owner inválido ('$ISSUE_TITLE'); nada a fazer."
            exit 0
          fi
          echo "in_scope=1" >> "$GITHUB_OUTPUT"
          echo "submission_id=${sub_id}" >> "$GITHUB_OUTPUT"
          echo "target_owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "explicit_owner=${explicit_owner}" >> "$GITHUB_OUTPUT"

      - name: Validate merged submission
        id: submission
        if: steps.scope.outputs.in_scope == '1'
        env:
          SUBMISSION_ID: ${{ steps.scope.outputs.submission_id }}
          TARGET_OWNER: ${{ steps.scope.outputs.target_owner }}
          EXPLICIT_OWNER: ${{ steps.scope.outputs.explicit_owner }}
        run: |
          set -uo pipefail

          # Forma `test/<owner>/<id>`: só vale para autor confiável. Sem isso,
          # qualquer um poderia disparar benchmark da submissão alheia.
          if [[ "$EXPLICIT_OWNER" == "1" ]]; then
            set -f  # noglob: `github-actions[bot]` tem `[..]` (classe de glob)
            author_lc="$(printf '%s' "$ISSUE_AUTHOR" | tr '[:upper:]' '[:lower:]')"
            is_trusted=0
            for a in $TRUSTED_AUTHORS; do
              a_lc="$(printf '%s' "$a" | tr '[:upper:]' '[:lower:]')"
              if [[ "$author_lc" == "$a_lc" ]]; then is_trusted=1; break; fi
            done
            if [[ "$is_trusted" != "1" ]]; then
              echo "ok=0" >> "$GITHUB_OUTPUT"
              {
                echo 'reason<<EOF'
                echo "Only trusted maintainers may target another user's submission via \`test/<owner>/<id>\`. Author \`$ISSUE_AUTHOR\` is not trusted — use \`test/<id>\` for your own submission."
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if ! [[ "$TARGET_OWNER" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,38}$ ]]; then
            echo "ok=0" >> "$GITHUB_OUTPUT"
            {
              echo 'reason<<EOF'
              echo "The target owner (\`$TARGET_OWNER\`) does not pass GitHub username format validation."
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          path="submissions/${TARGET_OWNER}.json"
          tmp=$(mktemp)
          if ! gh api "repos/${GH_REPO}/contents/${path}" \
                 -H "Accept: application/vnd.github.raw+json" \
                 > "$tmp" 2>/dev/null; then
            echo "ok=0" >> "$GITHUB_OUTPUT"
            {
              echo 'reason<<EOF'
              echo "Submission \`$path\` was not found on the default branch."
              echo ""
              echo "Open a PR adding \`$path\` and wait for the merge before requesting a benchmark. See [submitting.md](../blob/master/docs/en/submitting.md)."
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # O JSON ja passou pelo PR gate; aqui so confirmamos que o id
          # informado no titulo existe na lista.
          if ! jq -e --arg id "$SUBMISSION_ID" \
               '.submissions | type == "array" and any(.id == $id)' \
               "$tmp" >/dev/null 2>&1; then
            ids=$(jq -r '[.submissions[]?.id] | join(", ")' "$tmp" 2>/dev/null || true)
            echo "ok=0" >> "$GITHUB_OUTPUT"
            {
              echo 'reason<<EOF'
              echo "Submission id \`$SUBMISSION_ID\` does not exist in \`$path\`."
              echo ""
              echo "Available ids: \`${ids:-<none>}\`."
              echo ""
              echo "Check the issue title (\`test/<id>\`) and the contents of \`$path\` on the default branch."
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ok=1" >> "$GITHUB_OUTPUT"
          echo "Submissão $path encontrada e id '$SUBMISSION_ID' presente."

      - name: Approved — apply benchmark-request
        if: steps.scope.outputs.in_scope == '1' && steps.submission.outputs.ok == '1'
        env:
          SUBMISSION_ID: ${{ steps.scope.outputs.submission_id }}
        run: |
          set -uo pipefail
          gh issue edit "$ISSUE_NUMBER" --add-label benchmark-request
          gh issue comment "$ISSUE_NUMBER" --body "✅ Request validated (id \`${SUBMISSION_ID}\`) and queued (label \`benchmark-request\`). The Pi-Bench daemon will pick it up on the next polling pass."

      - name: Rejected — comment, label and close
        if: steps.scope.outputs.in_scope == '1' && steps.submission.outputs.ok != '1'
        env:
          REASON: ${{ steps.submission.outputs.reason }}
        run: |
          set -uo pipefail
          {
            echo "❌ Benchmark request **rejected** automatically."
            echo
            echo "$REASON"
            echo
            echo "Fix it and open a new issue."
          } > /tmp/comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/comment.md
          gh issue edit "$ISSUE_NUMBER" --add-label benchmark-rejected
          gh issue close "$ISSUE_NUMBER" --reason "not planned"
